<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head><body style="margin:0">
<div id="log" style="font-size:14px;background:yellow;padding:8px;white-space:pre-wrap"></div>
<script>
  function logLine(s){ document.getElementById('log').textContent += s + "\n"; }
  var fd = new FormData();
  fd.append('access_key', '60288488-00d4-4908-9923-efb392d16179');
  fd.append('name', 'Teste diagnostico producao');
  fd.append('phone', '(18) 90000-0000');
  fd.append('subject', 'Teste diagnostico');
  fd.append('message', 'teste via fetch real em producao');
  logLine('origin: ' + window.location.origin);
  fetch('https://api.web3forms.com/submit', {
    method: 'POST',
    headers: { 'Accept': 'application/json' },
    body: fd
  }).then(function(r){
    logLine('HTTP status: ' + r.status + ' ok=' + r.ok);
    return r.text();
  }).then(function(text){
    logLine('raw response body: ' + text);
  }).catch(function(err){
    logLine('fetch threw error: ' + err.name + ': ' + err.message);
  });
</script>
</body></html>
