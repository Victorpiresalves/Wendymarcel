<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head><body style="margin:0">
<div id="log" style="font-size:16px;background:yellow;padding:8px;white-space:pre-wrap;position:relative;z-index:999"></div>
<script src="/imoveis-data.js"></script>
<script src="/lead-form.js"></script>
<script>
  function logLine(s){ document.getElementById('log').textContent += s + "\n"; }
  var container = document.createElement('form');
  container.id = 'testLeadForm';
  document.body.appendChild(container);
  window.wendyMountLeadForm(container, 'TESTE AUTOMATIZADO - pode ignorar', false);

  setTimeout(function(){
    container.querySelector('[name="name"]').value = 'TESTE Claude Code - pode ignorar/apagar';
    container.querySelector('[name="phone"]').value = '(18) 90000-0000';
    container.querySelector('[name="tipo_interesse"]').value = 'Casa';
    logLine('campos preenchidos, enviando...');
    container.querySelector('button[type="submit"]').click();

    var checkCount = 0;
    var iv = setInterval(function(){
      checkCount++;
      var resultEl = container.querySelector('.lead-result');
      var state = resultEl.getAttribute('data-state');
      var btn = container.querySelector('button[type="submit"]');
      logLine('check ' + checkCount + ': btnText="' + btn.textContent + '" state=' + state + ' text="' + resultEl.textContent + '"');
      if(state === 'success' || state === 'error' || checkCount > 15){
        clearInterval(iv);
        logLine('DONE');
      }
    }, 700);
  }, 500);
</script>
</body></html>
